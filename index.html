<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Print Lab">
<meta name="theme-color" content="#16161A">
<title>Print Lab — Bambu X2D</title>
<style>
:root{
  --bg:#16161A;--surface:#1F1F24;--surface2:#27272E;--line:#34343C;
  --text:#ECECEF;--muted:#9A9AA4;--dim:#6C6C76;
  --orange:#E0652F;--red:#E24B4A;--green:#1D9E75;--gray:#888780;--blue:#3B7DD8;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
header{position:sticky;top:0;z-index:20;background:rgba(22,22,26,.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--line);padding:calc(12px + env(safe-area-inset-top)) 16px 12px}
.h-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.h-title{font-size:17px;font-weight:650;letter-spacing:-.2px}
.h-sub{font-size:11px;color:var(--dim);margin-top:2px}
.stats{display:flex;gap:8px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stat{flex:0 0 auto;background:var(--surface);border:0.5px solid var(--line);border-radius:10px;padding:8px 12px;min-width:74px}
.stat .v{font-size:18px;font-weight:650}
.stat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-top:1px}
main{padding:14px 16px 0}
.view{display:none}.view.on{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.view-h{font-size:13px;font-weight:600;color:var(--muted);margin:4px 2px 12px;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.view-h .sub{font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0;font-size:12px}
.card{background:var(--surface);border:0.5px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
.swatch{display:inline-block;width:11px;height:11px;border-radius:3px;border:0.5px solid rgba(255,255,255,.12);flex-shrink:0}
.tap{cursor:pointer}.tap:active{opacity:.8}
.inv .top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.inv .name{font-size:14px;font-weight:550}
.inv .type{font-size:10px;color:var(--dim);border:0.5px solid var(--line);border-radius:5px;padding:1px 5px;margin-left:auto}
.bar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;margin-bottom:9px}
.bar i{display:block;height:100%;border-radius:3px}
.inv .ctl{display:flex;align-items:center;gap:7px}
.grams{font-size:15px;font-weight:650;min-width:58px}
.grams.low{color:var(--orange)}
.grams.confirm{font-size:12px;font-weight:500;color:var(--dim);font-style:italic}
.spend{margin-left:auto;display:flex;gap:6px}
.chip{font-size:12px;font-weight:600;padding:7px 10px;border-radius:9px;background:var(--surface2);border:0.5px solid var(--line);color:var(--text);min-width:40px}
.chip:active{background:var(--orange);border-color:var(--orange)}
.chip.edit{color:var(--muted)}
.b-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.b-name{font-size:15px;font-weight:600;line-height:1.25}
.b-meta{font-size:12.5px;color:var(--muted);line-height:1.55}
.b-block{font-size:11.5px;color:var(--orange);margin-top:7px}
.b-mats{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--line);color:var(--muted);display:flex;align-items:center;gap:5px}
.badge{font-size:10.5px;font-weight:650;padding:4px 9px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.badge.active{background:rgba(29,158,117,.16);color:#3FD9A0}
.badge.queue{background:var(--surface2);color:var(--muted)}
.badge.done{background:rgba(59,125,216,.16);color:#7FB0F0}
.badge.failed{background:rgba(226,75,74,.16);color:#F08785}
.b-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.act{flex:1;min-width:84px;font-size:12.5px;font-weight:600;padding:9px;border-radius:9px;background:var(--surface2);border:0.5px solid var(--line);color:var(--text)}
.act:active{opacity:.7}
.act.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.iter{font-size:11.5px;color:var(--dim);margin-top:8px;padding-left:9px;border-left:2px solid var(--line);line-height:1.5}
.lesson{display:flex;gap:11px;padding:11px 0;border-bottom:0.5px solid var(--line);font-size:13px}
.lesson:last-child{border-bottom:none}
.lesson .d{color:var(--dim);min-width:62px;flex-shrink:0;font-size:11px;padding-top:1px}
.lesson .t{line-height:1.5}
.add-row{display:flex;gap:8px;margin-top:10px}
input.field,textarea.field,select.field{flex:1;background:var(--surface2);border:0.5px solid var(--line);color:var(--text);border-radius:10px;padding:11px;font-size:14px;font-family:inherit;width:100%}
textarea.field{min-height:64px;resize:vertical}
select.field{appearance:none}
.btn{font-size:14px;font-weight:600;padding:11px 16px;border-radius:10px;border:none;background:var(--orange);color:#fff}
.btn:active{opacity:.8}
.btn.ghost{background:var(--surface2);color:var(--text);border:0.5px solid var(--line)}
.btn.danger{background:rgba(226,75,74,.14);color:#F08785;border:0.5px solid rgba(226,75,74,.3)}
.btn.full{width:100%}.btn.sm{font-size:12.5px;padding:9px 13px}
.add-build{width:100%;border:1px dashed var(--line);background:transparent;color:var(--muted);border-radius:var(--r);padding:14px;font-size:13.5px;font-weight:600;margin-bottom:10px}
.add-build:active{border-color:var(--orange);color:var(--orange)}
.shop{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:0.5px solid var(--line)}
.shop:last-child{border-bottom:none}
.box{width:24px;height:24px;border-radius:7px;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.box.on{background:var(--green);border-color:var(--green)}
.shop .i{font-size:14px}.shop .i.got{color:var(--dim);text-decoration:line-through}
.shop .p{font-size:11px;color:var(--dim);margin-top:2px}
.fail{padding:11px 0;border-bottom:0.5px solid var(--line);font-size:12.5px;line-height:1.55}
.fail:last-child{border-bottom:none}.fail .n{font-weight:650}
.report-note{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.report-actions{display:flex;flex-direction:column;gap:9px}
.export-box{margin-top:14px;display:none}
.export-box textarea{width:100%;min-height:200px;font-size:11px;line-height:1.45;background:var(--surface);border:0.5px solid var(--line);color:var(--text);border-radius:10px;padding:12px}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--green);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:22px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:90}
.toast.show{opacity:1}
.ref{font-size:12px;color:var(--muted);line-height:1.6}
.ref table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px}
.ref td{padding:6px 7px;border-bottom:0.5px solid var(--line);vertical-align:top}
.ref td:first-child{color:var(--text);white-space:nowrap;font-weight:500}
.ref details{margin-top:10px}.ref summary{cursor:pointer;color:var(--orange);font-size:12.5px;font-weight:600;padding:6px 0}
.scheme{display:flex;align-items:center;gap:9px;padding:6px 0}
.scheme .dots{display:flex;gap:3px}.scheme .nm{font-size:12px;min-width:108px}.scheme .us{font-size:11px;color:var(--dim)}
nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(22,22,26,.94);backdrop-filter:blur(14px);border-top:0.5px solid var(--line);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.tab{flex:1;background:none;border:none;color:var(--dim);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.tab.on{color:var(--orange)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:80;background:var(--bg);border-top:0.5px solid var(--line);border-radius:20px 20px 0 0;padding:8px 16px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .24s cubic-bezier(.2,.8,.2,1)}
.sheet.on{transform:none}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 14px}
.sheet h3{font-size:16px;font-weight:650;margin-bottom:14px}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin:12px 2px 5px}
.row2{display:flex;gap:8px}
.color-edit{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.ce-pill{display:flex;align-items:center;gap:6px;background:var(--surface2);border:0.5px solid var(--line);border-radius:20px;padding:4px 6px 4px 9px;font-size:11.5px}
.ce-x{color:var(--dim);font-weight:700;padding:0 3px}
.sheet-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="h-row">
    <div><div class="h-title">Print Lab · Bambu X2D</div><div class="h-sub" id="updated">—</div></div>
    <button class="btn sm ghost" onclick="go('report')">Report ↗</button>
  </div>
  <div class="stats" id="stats"></div>
</header>

<main>
  <section class="view on" id="v-inv">
    <div class="view-h">Inventory <span class="sub" id="inv-sub"></span></div>
    <div id="inv-list"></div>
    <button class="add-build" onclick="openInv(-1)">+ Add spool</button>
  </section>

  <section class="view" id="v-builds">
    <div class="view-h">Projects <span class="sub" id="builds-sub"></span></div>
    <button class="add-build" onclick="openBuild(-1)">+ New project</button>
    <div id="builds-list"></div>
  </section>

  <section class="view" id="v-log">
    <div class="view-h">Lessons</div>
    <div class="card">
      <div id="lessons-list"></div>
      <div class="add-row"><input class="field" id="lesson-in" placeholder="New lesson learned…"></div>
      <div style="margin-top:9px"><button class="btn sm" onclick="addLesson()">Log lesson</button></div>
    </div>
    <div class="view-h" style="margin-top:18px">Failures / issues</div>
    <div class="card" id="fail-card"></div>
  </section>

  <section class="view" id="v-shop">
    <div class="view-h">SAYAL list <span class="sub" id="shop-sub"></span></div>
    <div class="card" id="shop-list"></div>
    <div class="view-h" style="margin-top:18px">Reference</div>
    <div class="card ref" id="ref-card"></div>
  </section>

  <section class="view" id="v-report">
    <div class="view-h">Report</div>
    <div class="card">
      <div class="report-note">This app lives on your phone. Your Claude project is what a new conversation reads. Generate a report and upload it so the two stay in sync — that <b>is</b> the live loop.</div>
      <div class="report-actions">
        <button class="btn full" onclick="genMarkdown()">Generate Markdown · for project</button>
        <button class="btn full ghost" onclick="copyAIPrompt()">Copy AI summary prompt · paste into Claude</button>
        <button class="btn full ghost" onclick="savePDF()">Save as PDF · for records</button>
      </div>
      <div class="export-box" id="export-box">
        <textarea id="export-text" class="mono" readonly></textarea>
        <div class="add-row" style="margin-top:9px">
          <button class="btn sm" onclick="copyExport()">Copy</button>
          <button class="btn sm ghost" onclick="document.getElementById('export-box').style.display='none'">Close</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="view-h" style="margin:0 0 10px">Maintenance</div>
      <button class="btn sm ghost" onclick="resetData()">Reset to handoff data</button>
    </div>
  </section>
</main>

<nav>
  <button class="tab" data-v="inv" onclick="go('inv')"><svg viewBox="0 0 24 24"><path d="M4 7l8-4 8 4v10l-8 4-8-4z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg>Inventory</button>
  <button class="tab" data-v="builds" onclick="go('builds')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 4v2.5M12 17.5V20M4 12h2.5M17.5 12H20M6.3 6.3l1.8 1.8M15.9 15.9l1.8 1.8M17.7 6.3l-1.8 1.8M8.1 15.9l-1.8 1.8"/></svg>Projects</button>
  <button class="tab" data-v="log" onclick="go('log')"><svg viewBox="0 0 24 24"><path d="M5 4h14v16l-7-3-7 3z"/></svg>Lessons</button>
  <button class="tab" data-v="shop" onclick="go('shop')"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L5 3H3M9 20a1 1 0 100-2 1 1 0 000 2zM17 20a1 1 0 100-2 1 1 0 000 2z"/></svg>SAYAL</button>
  <button class="tab" data-v="report" onclick="go('report')"><svg viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5M10 13h6M10 17h6"/></svg>Report</button>
</nav>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheet-body"></div></div>
<div class="toast" id="toast"></div>

<script>
const KEY='printlab_app_v2';
function freshData(){return{
  updated:null,materialUsed:0,
  builds:[
    {id:'b001',name:'Mechanical business card',status:'active',phase:1,started:'Jun 2026',
     notes:'Design phase — Fusion base plate next. 110×70×12mm. Gear train, rack & pinion, ratchet + pawl.',
     blocking:'Fusion 360 install',est:'~83g mixed',used:0,
     colors:[['#2C2C2A','PETG Black base'],['#444441','PLA Charcoal cover'],['#E0652F','PLA Orange drive gear'],['#888780','PLA Ash Gray driven'],['#E24B4A','PLA Red pawl']],iter:[]},
    {id:'b002',name:'Desk vise',status:'queue',phase:1,notes:'Leadscrew-driven functional tool.',blocking:'Threaded rod from SAYAL',est:'~120g PETG',used:0,colors:[],iter:[]},
    {id:'b003',name:'Articulating landing gear',status:'queue',phase:1,notes:'Oleo strut + scissors linkage. AME-relevant.',blocking:'Fusion comfort level',est:'~200g mixed',used:0,colors:[],iter:[]},
    {id:'b004',name:'Single cylinder engine',status:'queue',phase:3,notes:'Fully articulating, every part self-designed. Portfolio piece. (Doc: queue says P1 capstone, roadmap says P3 — reconcile.)',blocking:'Landing gear first',est:'~400g+ mixed',used:0,colors:[],iter:[]}
  ],
  completed:[
    {name:'Spring fidget knife',material:'PLA Matte',date:'Jun 2026',result:'Excellent — snaps and holds detent'},
    {name:'Spring fidget knife',material:'PETG Black',date:'Jun 2026',result:'Functional but slides — detent fails'}
  ],
  failed:[],
  lessons:[
    {date:'Jun 2026',text:'PETG creeps under spring load — fidget knife detent failed. PLA holds snap. Never PETG for spring/detent members.'},
    {date:'Jun 2026',text:'Material choice is per-component, not per-print. Same assembly can use both PLA and PETG.'}
  ],
  inv:[
    {name:'PLA Matte White',type:'PLA',c:'#F0EEE8',g:400},
    {name:'PLA Mandarin Orange',type:'PLA',c:'#E0652F',g:1000},
    {name:'PLA Scarlet Red',type:'PLA',c:'#E24B4A',g:1000},
    {name:'PLA Charcoal Black',type:'PLA',c:'#444441',g:1000},
    {name:'PLA Lilac Purple',type:'PLA',c:'#7F77DD',g:1000},
    {name:'PLA Ash Gray',type:'PLA',c:'#888780',g:1000},
    {name:'PETG Black',type:'PETG',c:'#2C2C2A',g:600},
    {name:'PETG Navy Blue',type:'PETG',c:'#185FA5',g:1000},
    {name:'PETG Transparent',type:'PETG',c:'#B5D4F4',g:null},
    {name:'PETG Orange',type:'PETG',c:'#EF9F27',g:null},
    {name:'PVA Clear',type:'PVA',c:'#E1F5EE',g:500}
  ],
  shop:[
    {i:'M3/M4/M5 heat-set brass inserts',p:'Pivot holes, threaded joints',got:false},
    {i:'Compression springs (assorted)',p:'Pawl spring, shock strut analog',got:false},
    {i:'Threaded rod M6/M8 + nuts',p:'Desk vise leadscrew',got:false},
    {i:'608 bearings ×6+',p:'Gear shaft housings',got:false},
    {i:'M3 screws + nuts (100pc)',p:'General assembly hardware',got:false}
  ],
  rules:[['Snap fits, detents','PLA','Holds snap, no creep'],['Sustained spring load','PLA','PETG creeps (fidget knife)'],['Chassis, housings','PETG','Dimensional stability'],['Sliding surfaces','PETG','Wear resistance'],['Gear faces','PLA/PLA or PLA/PETG','Lower friction'],['Axle pins, shear','PETG','Toughness'],['Outdoor / heat','PETG','Higher Tg'],['Complex overhangs','PVA','Dissolves clean'],['Display / low stress','PLA Matte','Best finish']],
  schemes:[['Mechanical',['#2C2C2A','#E0652F','#888780','#444441','#E24B4A'],'Business card, display'],['Studio',['#444441','#E0652F','#888780'],'Desk tools'],['Ocean/Night',['#185FA5','#2C2C2A','#F0EEE8'],'Planters, geometric'],['Arcane',['#7F77DD','#E24B4A','#444441'],'Terrain, dice'],['Warm Neutral',['#E0652F','#F0EEE8','#888780'],'Planters, kitchen'],['Aircraft',['#888780','#F0EEE8','#185FA5'],'AME models']]
};}

let D;
function load(){try{const r=localStorage.getItem(KEY);D=r?JSON.parse(r):freshData();}catch(e){D=freshData();}}
function save(){D.updated=new Date().toISOString();try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}renderStats();}
function esc(s){return(s==null?'':''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function mon(){return new Date().toLocaleDateString('en-CA',{month:'short',year:'numeric'});}
function day(){return new Date().toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
function go(v){document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));document.getElementById('v-'+v).classList.add('on');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));window.scrollTo(0,0);}

function renderStats(){
  const active=D.builds.filter(b=>b.status==='active').length;
  const low=D.inv.filter(m=>m.g!=null&&m.g<200).length;
  document.getElementById('updated').textContent=D.updated?'Updated '+new Date(D.updated).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'Not yet updated';
  document.getElementById('stats').innerHTML=stt(active,'Active')+stt(D.completed.length,'Done')+stt(Math.round(D.materialUsed)+'g','Used')+stt(D.lessons.length,'Lessons')+stt(low,'Low spools');
}
function stt(v,l){return `<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`;}

function renderInv(){
  document.getElementById('inv-sub').textContent=D.inv.length+' spools';
  document.getElementById('inv-list').innerHTML=D.inv.map((m,i)=>{
    let mid;
    if(m.g==null){mid=`<div class="ctl"><span class="grams confirm">confirm stock</span><span class="spend"><button class="chip edit" onclick="openInv(${i})">Edit</button></span></div>`;}
    else{
      const low=m.g<200,pct=Math.max(2,Math.min(100,m.g/1000*100));
      mid=`<div class="bar"><i style="width:${pct}%;background:${m.c}"></i></div>
      <div class="ctl"><span class="grams ${low?'low':''}">${Math.round(m.g)}g${low?' ⚠':''}</span>
      <span class="spend"><button class="chip" onclick="spend(${i},10)">−10</button><button class="chip" onclick="spend(${i},25)">−25</button><button class="chip" onclick="spend(${i},50)">−50</button><button class="chip edit" onclick="openInv(${i})">✎</button></span></div>`;
    }
    return `<div class="card inv"><div class="top tap" onclick="openInv(${i})"><span class="swatch" style="background:${m.c}"></span><span class="name">${esc(m.name)}</span><span class="type">${m.type}</span></div>${mid}</div>`;
  }).join('');
}
function spend(i,g){const m=D.inv[i];if(m.g==null)return;m.g=Math.max(0,m.g-g);D.materialUsed+=g;save();renderInv();}

function renderBuilds(){
  const a=D.builds.filter(b=>b.status==='active').length,q=D.builds.filter(b=>b.status==='queue').length;
  document.getElementById('builds-sub').textContent=`${a} active · ${q} queued`;
  let html=D.builds.map(b=>buildCard(b,false)).join('');
  html+=D.completed.map(c=>buildCard({name:c.name,status:'done',notes:c.result,date:c.date},true)).join('');
  document.getElementById('builds-list').innerHTML=html;
}
function buildCard(b,done){
  const mats=(b.colors&&b.colors.length)?`<div class="b-mats">${b.colors.map(c=>`<span class="pill"><span class="swatch" style="background:${c[0]}"></span>${esc(c[1])}</span>`).join('')}</div>`:'';
  const meta=[b.notes?esc(b.notes):'',b.est?'Est. '+esc(b.est):'',(b.used>0)?'Used '+Math.round(b.used)+'g':'',b.date?esc(b.date):''].filter(Boolean).join(' · ');
  const block=(b.status==='queue'&&b.blocking)?`<div class="b-block">⏳ ${esc(b.blocking)}</div>`:'';
  const iters=(b.iter&&b.iter.length)?b.iter.map(it=>`<div class="iter">${esc(it.date)} — ${esc(it.note)}</div>`).join(''):'';
  const phase=b.phase?`<span class="pill">P${b.phase}</span>`:'';
  let actions='';
  if(!done){
    const next=b.status==='queue'?['active','Start']:b.status==='active'?['done','Mark done']:['queue','Queue'];
    actions=`<div class="b-actions">
      <button class="act primary" onclick="cycle('${b.id}','${next[0]}')">${next[1]}</button>
      <button class="act" onclick="addIter('${b.id}')">+ Iteration</button>
      <button class="act" onclick="addUsed('${b.id}')">+ Grams</button>
      <button class="act" onclick="openBuild2('${b.id}')">Edit</button>
    </div>`;
  }
  return `<div class="card"><div class="b-top ${done?'':'tap'}" ${done?'':`onclick="openBuild2('${b.id}')"`}><span class="b-name">${esc(b.name)}</span><span style="display:flex;gap:6px;align-items:center">${phase}<span class="badge ${b.status}">${b.status}</span></span></div><div class="b-meta">${meta}</div>${block}${mats}${iters}${actions}</div>`;
}
function openBuild2(id){const i=D.builds.findIndex(b=>b.id===id);if(i>=0)openBuild(i);}
function cycle(id,to){
  const b=D.builds.find(x=>x.id===id);if(!b)return;
  if(to==='done'){D.completed.push({name:b.name,material:'mixed',date:mon(),result:b.notes||'Completed'});D.builds=D.builds.filter(x=>x.id!==id);toast('Moved to completed');}
  else if(to==='active'){b.status='active';if(!b.started)b.started=mon();}
  else b.status=to;
  save();renderBuilds();
}
function addIter(id){const b=D.builds.find(x=>x.id===id);if(!b)return;const n=prompt('Iteration note (what changed / fit issue):','');if(!n)return;b.iter=b.iter||[];b.iter.push({date:day(),note:n});save();renderBuilds();}
function addUsed(id){const b=D.builds.find(x=>x.id===id);if(!b)return;const v=prompt('Grams used on this build this session:','');const n=parseFloat(v);if(isNaN(n))return;b.used=(b.used||0)+n;D.materialUsed+=n;save();renderBuilds();}

function renderLog(){
  document.getElementById('lessons-list').innerHTML=[...D.lessons].reverse().map(l=>`<div class="lesson"><span class="d">${esc(l.date)}</span><span class="t">${esc(l.text)}</span></div>`).join('');
  const fc=document.getElementById('fail-card');
  fc.innerHTML=D.failed.length?D.failed.map(f=>`<div class="fail"><span class="n">${esc(f.name)}</span> · ${esc(f.date)}<br>${esc(f.failureMode)}${f.fix?' · Fix: '+esc(f.fix):''}</div>`).join(''):`<div style="font-size:12.5px;color:var(--dim)">No failures logged. Mark a project failed from its Edit screen.</div>`;
}
function addLesson(){const el=document.getElementById('lesson-in');const v=el.value.trim();if(!v)return;D.lessons.push({date:mon(),text:v});el.value='';save();renderLog();toast('Lesson logged');}

function renderShop(){
  const got=D.shop.filter(s=>s.got).length;
  document.getElementById('shop-sub').textContent=`${got}/${D.shop.length} got`;
  document.getElementById('shop-list').innerHTML=D.shop.map((s,i)=>`<div class="shop" onclick="toggleShop(${i})"><span class="box ${s.got?'on':''}">${s.got?'✓':''}</span><span><span class="i ${s.got?'got':''}">${esc(s.i)}</span><div class="p">${esc(s.p)}</div></span></div>`).join('');
  document.getElementById('ref-card').innerHTML=`<table>${D.rules.map(r=>`<tr><td>${esc(r[0])}</td><td style="color:var(--text)">${esc(r[1])}</td><td style="color:var(--dim)">${esc(r[2])}</td></tr>`).join('')}</table><details><summary>Colour schemes ▾</summary>${D.schemes.map(s=>`<div class="scheme"><span class="dots">${s[1].map(c=>`<span class="swatch" style="background:${c}"></span>`).join('')}</span><span class="nm">${s[0]}</span><span class="us">${s[2]}</span></div>`).join('')}</details>`;
}
function toggleShop(i){D.shop[i].got=!D.shop[i].got;save();renderShop();}

let editColors=[];
function openSheet(html){document.getElementById('sheet-body').innerHTML=html;document.getElementById('scrim').classList.add('on');document.getElementById('sheet').classList.add('on');}
function closeSheet(){document.getElementById('scrim').classList.remove('on');document.getElementById('sheet').classList.remove('on');}

function openInv(i){
  const m=i>=0?D.inv[i]:{name:'',type:'PLA',c:'#888780',g:1000};
  openSheet(`<h3>${i>=0?'Edit spool':'Add spool'}</h3>
    <div class="lbl">Name</div><input class="field" id="f-name" value="${esc(m.name)}" placeholder="e.g. PLA Matte Teal">
    <div class="row2"><div style="flex:1"><div class="lbl">Type</div>
      <select class="field" id="f-type">${['PLA','PETG','PVA','TPU','ABS','ASA','Other'].map(t=>`<option ${t===m.type?'selected':''}>${t}</option>`).join('')}</select></div>
      <div style="width:96px"><div class="lbl">Colour</div><input class="field" id="f-color" type="color" value="${m.c}" style="height:44px;padding:4px"></div></div>
    <div class="lbl">Grams remaining <span style="text-transform:none;color:var(--dim)">(blank = confirm later)</span></div>
    <input class="field mono" id="f-grams" inputmode="decimal" value="${m.g==null?'':m.g}" placeholder="e.g. 1000">
    <div class="sheet-actions">
      <button class="btn full" onclick="saveInv(${i})">Save</button>
      <button class="btn ghost" onclick="closeSheet()">Cancel</button>
      ${i>=0?`<button class="btn danger" onclick="delInv(${i})">Delete</button>`:''}
    </div>`);
}
function saveInv(i){
  const name=document.getElementById('f-name').value.trim();if(!name){toast('Name required');return;}
  const gv=document.getElementById('f-grams').value.trim();const g=gv===''?null:Math.max(0,parseFloat(gv)||0);
  const obj={name,type:document.getElementById('f-type').value,c:document.getElementById('f-color').value,g};
  if(i>=0)D.inv[i]=obj;else D.inv.push(obj);
  save();renderInv();closeSheet();toast(i>=0?'Spool updated':'Spool added');
}
function delInv(i){if(!confirm('Delete '+D.inv[i].name+'?'))return;D.inv.splice(i,1);save();renderInv();closeSheet();}

function openBuild(i){
  const b=i>=0?D.builds[i]:{name:'',status:'queue',phase:1,notes:'',blocking:'',est:'',used:0,colors:[],iter:[]};
  editColors=JSON.parse(JSON.stringify(b.colors||[]));
  openSheet(`<h3>${i>=0?'Edit project':'New project'}</h3>
    <div class="lbl">Name</div><input class="field" id="f-name" value="${esc(b.name)}" placeholder="e.g. Articulating landing gear">
    <div class="row2"><div style="flex:1"><div class="lbl">Status</div>
      <select class="field" id="f-status">${['queue','active','done','failed'].map(s=>`<option ${s===b.status?'selected':''}>${s}</option>`).join('')}</select></div>
      <div style="width:84px"><div class="lbl">Phase</div><input class="field mono" id="f-phase" inputmode="numeric" value="${b.phase||''}"></div></div>
    <div class="lbl">Notes / parameters</div><textarea class="field" id="f-notes" placeholder="Dimensions, module, clearance, design notes…">${esc(b.notes)}</textarea>
    <div class="row2"><div style="flex:1"><div class="lbl">Est. material</div><input class="field" id="f-est" value="${esc(b.est)}" placeholder="~200g mixed"></div>
      <div style="flex:1"><div class="lbl">Blocking</div><input class="field" id="f-block" value="${esc(b.blocking)}" placeholder="What's it waiting on"></div></div>
    <div class="lbl">Part colours</div><div class="color-edit" id="color-edit"></div>
    <button class="btn ghost sm" style="margin-top:8px" onclick="addColor()">+ Add part colour</button>
    <div class="sheet-actions">
      <button class="btn full" onclick="saveBuild(${i})">Save</button>
      <button class="btn ghost" onclick="closeSheet()">Cancel</button>
      ${i>=0?`<button class="btn danger" onclick="delBuild(${i})">Delete</button>`:''}
    </div>`);
  renderColorEdit();
}
function renderColorEdit(){
  document.getElementById('color-edit').innerHTML=editColors.length?editColors.map((c,j)=>`<span class="ce-pill"><span class="swatch" style="background:${c[0]}"></span>${esc(c[1])}<span class="ce-x tap" onclick="rmColor(${j})">×</span></span>`).join(''):`<span style="font-size:12px;color:var(--dim)">None yet</span>`;
}
function addColor(){const label=prompt('Part + colour label (e.g. "PLA Orange drive gear"):','');if(!label)return;const hex=prompt('Hex colour (e.g. #E0652F):','#888780')||'#888780';editColors.push([hex,label]);renderColorEdit();}
function rmColor(j){editColors.splice(j,1);renderColorEdit();}
function saveBuild(i){
  const name=document.getElementById('f-name').value.trim();if(!name){toast('Name required');return;}
  const status=document.getElementById('f-status').value;
  const obj={
    id:i>=0?D.builds[i].id:'b'+Date.now().toString(36),
    name,status,
    phase:parseInt(document.getElementById('f-phase').value)||null,
    notes:document.getElementById('f-notes').value.trim(),
    est:document.getElementById('f-est').value.trim(),
    blocking:document.getElementById('f-block').value.trim(),
    used:i>=0?(D.builds[i].used||0):0,
    started:i>=0?D.builds[i].started:(status==='active'?mon():null),
    colors:editColors,iter:i>=0?(D.builds[i].iter||[]):[]
  };
  if(status==='done'){D.completed.push({name,material:'mixed',date:mon(),result:obj.notes||'Completed'});if(i>=0)D.builds.splice(i,1);}
  else if(i>=0)D.builds[i]=obj;else D.builds.push(obj);
  save();renderBuilds();closeSheet();toast(i>=0?'Project updated':'Project added');
}
function delBuild(i){if(!confirm('Delete '+D.builds[i].name+'?'))return;D.builds.splice(i,1);save();renderBuilds();closeSheet();}

function buildMarkdown(){
  const inv=D.inv.map(m=>`| ${m.name} | ${m.type} | ${m.g==null?'confirm':Math.round(m.g)+'g'} |`).join('\n');
  const builds=D.builds.map(b=>`| ${b.name} | ${b.status} | P${b.phase||'-'} | ${b.est||''} | ${b.blocking||'—'} | ${b.used>0?Math.round(b.used)+'g':''} |`).join('\n');
  const done=D.completed.map(c=>`| ${c.name} | ${c.date} | ${c.material} | ${c.result} |`).join('\n');
  const fail=D.failed.length?D.failed.map(f=>`| ${f.name} | ${f.date} | ${f.failureMode} | ${f.fix} |`).join('\n'):'| — | — | — | — |';
  const less=D.lessons.map(l=>`| ${l.date} | ${l.text} |`).join('\n');
  const shop=D.shop.map(s=>`| ${s.i} | ${s.p} | ${s.got?'Yes':'No'} |`).join('\n');
  const iters=D.builds.flatMap(b=>(b.iter||[]).map(it=>`| ${b.name} | ${it.date} | ${it.note} |`));
  return `## Material Inventory
| Material | Type | Est. Stock |
|---|---|---|
${inv}

## Builds & Queue
| Build | Status | Phase | Est. | Blocking | Used |
|---|---|---|---|---|---|
${builds}

## Completed Prints
| Print | Date | Material | Result |
|---|---|---|---|
${done}

## Failed Prints / Issues
| Print | Date | Failure | Fix |
|---|---|---|---|
${fail}
${iters.length?`\n## Build Iterations\n| Build | Date | Note |\n|---|---|---|\n${iters.join('\n')}\n`:''}
## Key Lesson Log
| Date | Lesson |
|---|---|
${less}

## SAYAL Shopping List
| Item | Purpose | Got It? |
|---|---|---|
${shop}

Total material used to date: ${Math.round(D.materialUsed)}g`;
}
function genMarkdown(){
  document.getElementById('export-text').value=`<!-- Paste over the matching sections of print_tracker.md. From Print Lab app, ${day()}. -->\n\n`+buildMarkdown();
  showExport();
}
function copyAIPrompt(){
  const p=`You're my 3D print lab advisor. Below is my current tracker state (exported from my phone app on ${day()}). Compare it to the print_tracker.md in this project and write a short, direct progress update: what changed worth noting, which filament is running low, what's blocked and on what, and the single most useful next action. No filler. Then update the project doc to match.\n\n---\n${buildMarkdown()}`;
  copyText(p,'AI prompt copied — paste into Claude');
}
function showExport(){const b=document.getElementById('export-box');b.style.display='block';b.scrollIntoView({behavior:'smooth'});}
function copyExport(){copyText(document.getElementById('export-text').value,'Copied');}
function copyText(txt,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>toast(msg)).catch(()=>fallbackCopy(txt,msg));}
  else fallbackCopy(txt,msg);
}
function fallbackCopy(txt,msg){const t=document.getElementById('export-text');t.value=txt;showExport();t.focus();t.select();t.setSelectionRange(0,99999);try{document.execCommand('copy');toast(msg);}catch(e){toast('Select & copy manually');}}
function savePDF(){
  const w=window.open('','_blank');const row=c=>`<tr>${c.map(x=>`<td>${x}</td>`).join('')}</tr>`;
  const invR=D.inv.map(m=>row([m.name,m.type,m.g==null?'confirm':Math.round(m.g)+'g'])).join('');
  const bR=D.builds.map(b=>row([b.name,b.status,'P'+(b.phase||'-'),b.est||'',b.blocking||'—'])).join('');
  const dR=D.completed.map(c=>row([c.name,c.date,c.material,c.result])).join('');
  const lR=D.lessons.map(l=>row([l.date,l.text])).join('');
  if(!w){toast('Allow pop-ups to save PDF');return;}
  w.document.write(`<html><head><title>Print Lab Report ${day()}</title><style>body{font-family:-apple-system,Arial,sans-serif;padding:32px;color:#1a1a1a;max-width:720px;margin:auto}h1{font-size:20px;margin-bottom:2px}.sub{color:#888;font-size:12px;margin-bottom:24px}h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#555;margin:22px 0 8px;border-bottom:1px solid #ddd;padding-bottom:4px}table{width:100%;border-collapse:collapse;font-size:12px}td{padding:6px 8px;border-bottom:1px solid #eee;vertical-align:top}tr:first-child td{font-weight:600;color:#666}</style></head><body><h1>3D Print Lab — Bambu X2D</h1><div class="sub">Report ${day()} · ${Math.round(D.materialUsed)}g used to date</div><h2>Material Inventory</h2><table>${row(['Material','Type','Stock'])}${invR}</table><h2>Builds & Queue</h2><table>${row(['Build','Status','Phase','Est.','Blocking'])}${bR}</table><h2>Completed</h2><table>${row(['Print','Date','Material','Result'])}${dR}</table><h2>Lessons</h2><table>${row(['Date','Lesson'])}${lR}</table></body></html>`);
  w.document.close();setTimeout(()=>w.print(),350);toast('Share sheet → Save as PDF');
}
function resetData(){if(!confirm('Reset all app data to the original handoff? Erases logged updates on this phone.'))return;D=freshData();save();renderAll();toast('Reset');}

function renderAll(){renderStats();renderInv();renderBuilds();renderLog();renderShop();}
load();renderAll();go('inv');
</script>
</body>
</html>
